<div class="app-container" [ngClass]="{ 'bg-light': !account }">

  <!-- Mobile Toggle -->
  <button *ngIf="account" class="sidebar-toggle-mobile" (click)="showMobileSidebar = !showMobileSidebar">
    <i class="bi bi-list"></i>
  </button>

  <!-- Backdrop -->
  <div *ngIf="account" class="backdrop" [class.show]="showMobileSidebar" (click)="showMobileSidebar = false"></div>

  <!-- SIDEBAR -->
  <nav *ngIf="account" class="sidebar" [class.mobile-show]="showMobileSidebar">

    <!-- Header -->
    <div class="sidebar-header">
      <h1 class="title">Teacher Evaluation System</h1>
      <button class="toggle-btn d-none d-lg-block">
        <i class="bi bi-list-nested"></i>
      </button>
    </div>

    <!-- Navigation -->
    <div class="sidebar-nav">

      <!-- Home / Dashboard -->
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item-link">
        <i class="bi bi-grid-fill"></i>
        <span>Dashboard</span>
      </a>


      <!-- Academic Level -->
      <a *ngIf="account && (account.role === Role.Admin || account.role === Role.Coordinator)" routerLink="/grade-level"
        routerLinkActive="active-link" class="nav-item-link">
        <i class="bi bi-diagram-3"></i>
        <span>Academic Level</span>
      </a>

      <!-- Student Registration -->
      <a *ngIf="account && account.role === Role.Admin" routerLink="/student-registration"
        routerLinkActive="active-link" class="nav-item-link">
        <i class="bi bi-person-plus"></i>
        <span>Student Registration</span>
      </a>

      <!-- Submission of PDFs -->
      <a *ngIf="account && (account.role === Role.Admin || account.role === Role.Teacher || account.role === Role.Coordinator)"
        routerLink="/ai-upload" routerLinkActive="active-link" class="nav-item-link">
        <i class="bi bi-filetype-pdf"></i>
        <span>Submission of PDFs</span>
      </a>

      <!-- Submission History -->
      <a *ngIf="account && (account.role === Role.Admin || account.role === Role.Teacher || account.role === Role.Coordinator)"
        routerLink="/ai-upload/history" routerLinkActive="active-link" class="nav-item-link">
        <i class="bi bi-clock-history"></i>
        <span>Submission History</span>
      </a>

      <!-- Activity Logs -->
      <a *ngIf="account && account.role === Role.Admin" routerLink="/activity-logs" routerLinkActive="active-link"
        class="nav-item-link">
        <i class="bi bi-clock-history"></i>
        <span>Activity Logs</span>
      </a>

      <!-- Topic Approvals -->
      <a *ngIf="account && (account.role === Role.Admin || account.role === Role.Coordinator)"
        routerLink="/ai-upload/topic-approval" routerLinkActive="active-link" class="nav-item-link">
        <i class="bi bi-check2-circle"></i>
        <span>Topic Approvals</span>
      </a>

    </div>

    <!-- Footer / User Profile -->
    <div *ngIf="account" class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">
          <i class="bi bi-person-circle"></i>
        </div>
        <div class="user-details">
          <span class="user-name">{{ account.firstName }} {{ account.lastName }}</span>
          <span class="user-role">{{ account.role }}</span>
        </div>
      </div>
      <button (click)="logout()" class="logout-icon-btn" title="Logout">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>

  </nav>

  <!-- MAIN CONTENT -->
  <div class="main-content" [class.no-sidebar]="!account">
    <router-outlet name="subnav"></router-outlet>
    <alert></alert>
    <router-outlet></router-outlet>
  </div>

</div>
