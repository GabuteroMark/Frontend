<!-- ===============================
     PREMIUM DASHBOARD HERO PAGE
     (BLACK TEXT VERSION)
================================ -->

<style>
  /* Full page background */
  body {
    background: linear-gradient(135deg, #1e3a8a, #2563eb, #10b981);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
  }

  /* Animated gradient */
  @keyframes gradientMove {
    0% {
      background-position: 0% 50%;
    }

    50% {
      background-position: 100% 50%;
    }

    100% {
      background-position: 0% 50%;
    }
  }

  /* Center container */
  .dashboard-container {
    min-height: 100vh;
  }

  /* Glass card */
  .glass-card {
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 25px;
    border: 1px solid rgba(0, 0, 0, 0.08);
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
    color: #000;
    animation: fadeInUp 0.8s ease forwards;
    opacity: 0;
  }

  /* Entrance animation */
  @keyframes fadeInUp {
    from {
      transform: translateY(30px);
      opacity: 0;
    }

    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  /* Title */
  .hero-title {
    font-weight: 700;
    letter-spacing: 1px;
    color: #000;
  }

  /* Subtitle */
  .hero-subtitle {
    font-size: 1.1rem;
    color: #000;
  }

  /* Decorative glow */
  .glow-circle {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(0, 0, 0, 0.05), transparent 70%);
    top: -100px;
    right: -100px;
    border-radius: 50%;
    z-index: 0;
  }

  /* Ensure content above glow */
  .card-content {
    position: relative;
    z-index: 2;
  }

  /* Grid for Academic Levels */
  .level-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 30px;
    width: 100%;
    justify-content: center;
  }

  .level-card {
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-decoration: none;
    color: #1e293b;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(0, 0, 0, 0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    position: relative;
    overflow: hidden;
    min-height: 180px;
  }

  .level-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 35px rgba(13, 110, 253, 0.15);
    border-color: #0d6efd;
  }

  .level-card::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: #0d6efd;
    transform: scaleX(0);
    transition: transform 0.4s ease;
  }

  .level-card:hover::after {
    transform: scaleX(1);
  }

  .level-icon {
    font-size: 36px;
    margin-bottom: 12px;
  }

  .level-name {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 5px;
  }

  .level-desc {
    font-size: 0.8rem;
    color: #64748b;
  }

  /* ===============================
     RESPONSIVENESS
  ================================ */
  @media (max-width: 768px) {
    .glass-card {
      padding: 30px 20px !important;
      margin: 15px;
    }

    .hero-title {
      font-size: 2rem !important;
    }

    .level-grid {
      grid-template-columns: 1fr;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }
  }

  @media (min-width: 1400px) {
    .col-lg-9 {
      flex: 0 0 auto;
      width: 80%;
    }

    .level-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }
</style>

<div class="container-fluid d-flex justify-content-center align-items-center dashboard-container py-4"
  style="min-height: 100vh;">

  <div class="row justify-content-center text-center w-100 m-0">
    <div class="col-12 col-md-11 col-lg-10 col-xl-9">

      <div class="glass-card p-4 p-md-5 position-relative mx-auto" style="max-width: 1200px;">
        <div class="glow-circle"></div>
        <div class="card-content">
          <h1 class="display-4 hero-title mb-3">
            Hi, {{ account?.firstName }} 👋
          </h1>
          <p class="hero-subtitle mb-4">
            Login successful.<br><br>
            Welcome to the <strong>Question Databank and Test Questionnaire Generator</strong>,
            your intelligent platform for efficient exam creation,
            automated question generation, and streamlined assessment management.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
