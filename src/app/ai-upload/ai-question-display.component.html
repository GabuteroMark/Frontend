<style>
  .display-container {
    padding: 3rem 1.5rem;
    min-height: 85vh;
    display: flex;
    justify-content: center;
  }

  .premium-card {
    width: 100%;
    max-width: 900px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 32px;
    box-shadow: 0 40px 80px -15px rgba(30, 27, 75, 0.15);
    overflow: hidden;
  }

  .premium-header {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
    padding: 2.5rem 3rem;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .premium-title {
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }

  .premium-subtitle {
    font-size: 0.9rem;
    opacity: 0.75;
    font-weight: 500;
  }

  .premium-body {
    padding: 3rem;
  }

  /* Question Tile Styling */
  .question-tile {
    background: white;
    border: 1px solid #f1f5f9;
    border-radius: 20px;
    padding: 2rem;
    margin-bottom: 2rem;
    transition: all 0.3s ease;
    position: relative;
  }

  .question-tile:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.04);
    border-color: #e2e8f0;
  }

  .question-num {
    position: absolute;
    top: -12px;
    left: 20px;
    background: #4f46e5;
    color: white;
    padding: 0.25rem 0.75rem;
    border-radius: 10px;
    font-weight: 800;
    font-size: 0.75rem;
    box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
  }

  .question-text-elite {
    font-size: 1.15rem;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  /* Option Styling */
  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
  }

  .option-pill {
    background: #f8fafc;
    border: 1px solid #f1f5f9;
    padding: 0.8rem 1.25rem;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #475569;
    transition: 0.2s;
  }

  .option-pill:hover {
    background: #eff6ff;
    border-color: #dbeafe;
    color: #2563eb;
  }

  .option-letter {
    color: #4f46e5;
    font-weight: 800;
    margin-right: 0.5rem;
  }

  /* Action Section */
  .action-footer {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid #f1f5f9;
    display: flex;
    justify-content: flex-end;
  }

  .btn-download-elite {
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 1rem 2rem;
    font-weight: 800;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
  }

  .btn-download-elite:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(16, 185, 129, 0.3);
  }

  .btn-download-elite:disabled {
    opacity: 0.5;
    background: #94a3b8;
    box-shadow: none;
  }

  .empty-state-elite {
    text-align: center;
    padding: 5rem 0;
  }

  .empty-icon {
    font-size: 4rem;
    opacity: 0.15;
    margin-bottom: 1.5rem;
    display: block;
  }
</style>

<div class="display-container">
  <div class="premium-card shadow-2xl">

    <div class="premium-header">
      <div>
        <h4 class="premium-title">Synthesized Assessments</h4>
        <p class="premium-subtitle mb-0">AI-generated evaluation items based on your topic source</p>
      </div>
      <i class="bi bi-cpu-fill fs-1 opacity-25"></i>
    </div>

    <div class="premium-body">

      <!-- EMPTY STATE -->
      <div *ngIf="questions.length === 0" class="empty-state-elite">
        <i class="bi bi-robot empty-icon"></i>
        <h5 class="text-slate-400 fw-bold">Awaiting AI Synthesis</h5>
        <p class="text-slate-400">No questions have been generated for this resource yet.</p>
      </div>

      <!-- QUESTIONS LIST -->
      <div *ngIf="questions.length > 0">
        <div *ngFor="let q of questions; let i = index" class="question-tile shadow-sm">
          <div class="question-num">ITEM {{ i + 1 }}</div>

          <div class="question-text-elite">
            {{ q.question }}
          </div>

          <div class="options-grid">
            <div class="option-pill">
              <span class="option-letter">A.</span> {{ q.options.A }}
            </div>
            <div class="option-pill">
              <span class="option-letter">B.</span> {{ q.options.B }}
            </div>
            <div class="option-pill">
              <span class="option-letter">C.</span> {{ q.options.C }}
            </div>
            <div class="option-pill">
              <span class="option-letter">D.</span> {{ q.options.D }}
            </div>
          </div>
        </div>

        <!-- ACTIONS -->
        <div class="action-footer">
          <button class="btn-download-elite" (click)="downloadPDF()" [disabled]="!downloadUrl">
            <i class="bi bi-file-earmark-arrow-down-fill fs-5"></i>
            Export Assessment PDF
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
